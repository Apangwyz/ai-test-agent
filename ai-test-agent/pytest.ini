[pytest]
# 测试目录
testpaths = tests

# 测试文件模式
python_files = test_*.py

# 测试类模式
python_classes = Test*

# 测试方法模式
python_functions = test_*

# 覆盖报告配置
addopts = --cov=src --cov-report=html --cov-report=xml --cov-report=term

# 环境变量
env = 
    TESTING=True
    AI_MODEL_TYPE=qwen

# 忽略的路径
omit = 
    src/frontend/*
    src/api/*
