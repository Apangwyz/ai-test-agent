# 服务配置文件

# 服务基本信息
SERVICE_NAME="ai-agent-system"
SERVICE_DIR="/Users/apang/Documents/trae_projects/test-weaver/ai-agent-system"
VENV_DIR="${SERVICE_DIR}/venv"

# 服务启动信息
SERVICE_PORT=5000
SERVICE_HOST="0.0.0.0"
SERVICE_PID_FILE="${SERVICE_DIR}/service.pid"
SERVICE_LOG_FILE="${SERVICE_DIR}/scripts/logs/service.log"

# 环境配置
PYTHON_EXEC="${VENV_DIR}/bin/python"
FLASK_APP="app.py"
FLASK_ENV="production"

# 超时设置
START_TIMEOUT=30
STOP_TIMEOUT=30
RESTART_TIMEOUT=60

# 日志配置
LOG_MAX_SIZE=10485760  # 10MB
LOG_RETENTION_DAYS=7

# 备份配置
BACKUP_DIR="${SERVICE_DIR}/scripts/backups"
BACKUP_RETENTION_DAYS=30
BACKUP_INTERVAL=24  # 小时

# 健康检查
HEALTH_CHECK_URL="http://localhost:${SERVICE_PORT}/"
HEALTH_CHECK_TIMEOUT=5

# 资源监控阈值
CPU_THRESHOLD=80
MEMORY_THRESHOLD=80
DISK_THRESHOLD=85